<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MathLab IQube · Arman Teaches Math</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Space+Grotesk:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.2/dist/confetti.browser.min.js"></script>
<style>
/* ════════════════════════════════════════════
   ROOT TOKENS
════════════════════════════════════════════ */
:root {
  --bg:        #080b14;
  --bg2:       #0d1120;
  --bg3:       #111729;
  --bg4:       #161e33;
  --bdr:       rgba(255,255,255,.07);
  --bdr2:      rgba(255,255,255,.12);
  --gold:      #c9a227;
  --gold-hi:   #f0c040;
  --gold-lo:   #7a621a;
  --gold-dim:  rgba(201,162,39,.15);
  --gold-glow: rgba(201,162,39,.25);
  --white:     #f0f4ff;
  --txt:       #c8d4e8;
  --txt-m:     #4e6280;
  --txt-d:     #2a3a55;
  --green:     #3ecf8e;
  --red:       #e05a5a;
  --blue:      #4e8fff;
  --purple:    #a855f7;
  --orange:    #f97316;

  --lv-easy:    #3ecf8e;
  --lv-medium:  #4e8fff;
  --lv-advanced:#f97316;
  --lv-olympiad:#a855f7;

  --r:  10px;
  --r2: 6px;
  --sh: 0 8px 40px rgba(0,0,0,.5);
  --tr: .18s ease;
  --mono: 'Space Mono', monospace;
  --serif: 'Playfair Display', serif;
  --sans: 'Space Grotesk', sans-serif;
}

/* ════════════════════════════════════════════
   RESET & BASE
════════════════════════════════════════════ */
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body {
  font-family: var(--sans);
  background-color: var(--bg);
  background-image:
    linear-gradient(rgba(255,255,255,.022) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,.022) 1px, transparent 1px);
  background-size: 52px 52px;
  color: var(--txt);
  min-height: 100vh;
  line-height: 1.65;
}
button   { cursor:pointer; font-family:var(--sans); }
input, select, textarea { font-family:var(--sans); }

/* ════════════════════════════════════════════
   TYPOGRAPHY
════════════════════════════════════════════ */
.t-serif    { font-family: var(--serif); }
.t-mono     { font-family: var(--mono); }
.t-label    { font-family:var(--mono); font-size:.7rem; letter-spacing:.14em; text-transform:uppercase; color:var(--gold); }
.t-muted    { color:var(--txt-m); }
.t-white    { color:var(--white); }
.t-gold     { color:var(--gold-hi); }

/* ════════════════════════════════════════════
   NAVBAR
════════════════════════════════════════════ */
#navbar {
  position: sticky; top:0; z-index:200;
  background: rgba(8,11,20,.92);
  backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--bdr);
}
.nav-inner {
  max-width:1200px; margin:0 auto; padding:0 2rem;
  height:60px; display:flex; align-items:center; justify-content:space-between;
}
.nav-brand {
  display:flex; align-items:center; gap:12px; cursor:pointer; user-select:none;
}
.nav-mark {
  width:36px; height:36px;
  background: linear-gradient(135deg, var(--gold-lo), var(--gold));
  border-radius:8px;
  display:flex; align-items:center; justify-content:center;
  flex-shrink:0;
}
.nav-mark svg { width:20px; height:20px; }
.nav-title {
  font-family: var(--serif); font-size:1.1rem; font-weight:700;
  color: var(--white);
}
.nav-title span { color: var(--gold-hi); }
.nav-links { display:flex; align-items:center; gap:.5rem; }
.nav-btn {
  background:none; border:none; color:var(--txt-m);
  font-size:.82rem; font-weight:600; font-family:var(--mono);
  letter-spacing:.06em; text-transform:uppercase;
  padding:7px 14px; border-radius:6px; transition:var(--tr);
}
.nav-btn:hover { color:var(--gold-hi); background:var(--gold-dim); }
.nav-btn-gold {
  background: var(--gold); color: var(--bg);
  border:none; border-radius:6px; padding:7px 16px;
  font-size:.8rem; font-weight:700; font-family:var(--mono);
  letter-spacing:.06em; text-transform:uppercase; transition:var(--tr);
}
.nav-btn-gold:hover { background:var(--gold-hi); }

/* ════════════════════════════════════════════
   LAYOUT
════════════════════════════════════════════ */
.main { max-width:1200px; margin:0 auto; padding:3rem 2rem 5rem; }
.card {
  background: var(--bg2);
  border: 1px solid var(--bdr);
  border-radius: var(--r);
  padding: 1.8rem;
  box-shadow: var(--sh);
}
.card-sm { padding:1.2rem; }

/* ════════════════════════════════════════════
   HERO / PORTAL HEADER
════════════════════════════════════════════ */
.portal-hero {
  text-align:center;
  padding: 4rem 1rem 3rem;
  position: relative;
}
.portal-logo {
  width:110px; height:110px; margin:0 auto 1.8rem;
  background: linear-gradient(135deg, #1a2340, #0d1120);
  border: 1px solid var(--gold-lo);
  border-radius:24px;
  display:flex; align-items:center; justify-content:center;
  box-shadow: 0 0 50px rgba(201,162,39,.2), var(--sh);
  overflow:hidden;
  animation: logoFloat 4s ease-in-out infinite;
}
.portal-logo img { width:100%; height:100%; object-fit:cover; border-radius:22px; }
.portal-logo svg { width:54px; height:54px; }
.nav-mark img { width:100%; height:100%; object-fit:cover; border-radius:6px; }
@keyframes logoFloat {
  0%,100% { transform:translateY(0px); box-shadow:0 0 50px rgba(201,162,39,.2),0 8px 40px rgba(0,0,0,.5); }
  50%      { transform:translateY(-10px); box-shadow:0 0 65px rgba(201,162,39,.32),0 22px 55px rgba(0,0,0,.38); }
}
.portal-title {
  font-family: var(--serif);
  font-size: clamp(2rem, 5vw, 3.2rem);
  font-weight: 900;
  color: var(--white);
  line-height:1.1;
  margin-bottom:.6rem;
}
.portal-title span { color: var(--gold-hi); }
.portal-sub {
  font-family: var(--mono);
  font-size: .72rem;
  letter-spacing: .22em;
  text-transform: uppercase;
  color: var(--txt-m);
  margin-bottom:1.4rem;
}
.portal-divider {
  display:flex; align-items:center; justify-content:center; gap:1rem;
  margin-bottom: 2.5rem;
}
.portal-divider::before,
.portal-divider::after {
  content:''; flex:1; max-width:120px; height:1px; background:var(--gold-lo);
}
.portal-divider span {
  font-family: var(--mono); font-size:.7rem; letter-spacing:.18em;
  color: var(--gold); text-transform:uppercase;
}

/* ════════════════════════════════════════════
   SEARCH & FILTER BAR
════════════════════════════════════════════ */
.search-bar {
  max-width:720px; margin:0 auto 2rem;
  background: var(--bg2);
  border: 1px solid var(--bdr);
  border-radius: var(--r);
  padding:1.4rem 1.6rem;
}
.search-label { margin-bottom:.9rem; }
.search-row { display:flex; gap:.75rem; flex-wrap:wrap; }
.search-inp {
  flex:1; min-width:200px;
  background: var(--bg3); border:1px solid var(--bdr2);
  border-radius:6px; padding:11px 16px;
  color:var(--white); font-size:.93rem; outline:none; transition:var(--tr);
}
.search-inp:focus { border-color:var(--gold); box-shadow:0 0 0 3px var(--gold-dim); }
.search-inp::placeholder { color:var(--txt-m); }
.filter-sel {
  background: var(--bg3); border:1px solid var(--bdr2);
  border-radius:6px; padding:11px 14px;
  color:var(--txt); font-size:.85rem; outline:none; transition:var(--tr);
  font-family:var(--mono); letter-spacing:.04em;
}
.filter-sel:focus { border-color:var(--gold); }
.filter-sel option { background:var(--bg); }

/* ════════════════════════════════════════════
   QUIZ GRID
════════════════════════════════════════════ */
.quiz-grid {
  display:grid;
  grid-template-columns: repeat(auto-fill, minmax(300px,1fr));
  gap:1.2rem;
}
.qcard {
  position:relative; cursor:pointer;
  background: var(--bg2); border:1px solid var(--bdr);
  border-radius: var(--r); padding:1.6rem;
  box-shadow: var(--sh); transition: var(--tr);
  overflow:hidden;
}
.qcard::after {
  content:''; position:absolute; inset:0;
  background: linear-gradient(135deg, transparent 60%, rgba(201,162,39,.04));
  pointer-events:none;
}
.qcard:hover { border-color:var(--gold-lo); transform:translateY(-2px); box-shadow:0 12px 50px rgba(0,0,0,.6); }
.qcard-accent {
  position:absolute; top:0; left:0; width:3px; height:100%;
  border-radius:var(--r) 0 0 var(--r);
}
.qcard-top { display:flex; align-items:flex-start; justify-content:space-between; margin-bottom:.9rem; gap:.5rem; }
.qcard-badges { display:flex; gap:.4rem; flex-wrap:wrap; }
.qcard h3 { font-size:1.05rem; color:var(--white); margin:.4rem 0; line-height:1.4; }
.qcard-desc { font-size:.83rem; color:var(--txt-m); margin-bottom:1rem; line-height:1.5; }
.qcard-meta { display:flex; gap:1rem; font-size:.75rem; color:var(--txt-m); font-family:var(--mono); margin-bottom:1.2rem; flex-wrap:wrap; }
.qcard-meta span { display:flex; align-items:center; gap:4px; }

/* ════════════════════════════════════════════
   BADGES & LEVEL CHIPS
════════════════════════════════════════════ */
.chip {
  display:inline-flex; align-items:center; gap:4px;
  padding:3px 10px; border-radius:20px;
  font-family:var(--mono); font-size:.65rem; font-weight:700;
  letter-spacing:.08em; text-transform:uppercase;
}
.chip-open     { background:rgba(62,207,142,.12); color:var(--green);  border:1px solid rgba(62,207,142,.25); }
.chip-mathlab  { background:var(--gold-dim);       color:var(--gold-hi); border:1px solid rgba(201,162,39,.3); }
.chip-easy     { background:rgba(62,207,142,.12); color:var(--lv-easy);     border:1px solid rgba(62,207,142,.25); }
.chip-medium   { background:rgba(78,143,255,.12); color:var(--lv-medium);   border:1px solid rgba(78,143,255,.25); }
.chip-advanced { background:rgba(249,115,22,.12); color:var(--lv-advanced); border:1px solid rgba(249,115,22,.25); }
.chip-olympiad { background:rgba(168,85,247,.12); color:var(--lv-olympiad); border:1px solid rgba(168,85,247,.25); }

/* ════════════════════════════════════════════
   BUTTONS
════════════════════════════════════════════ */
.btn {
  display:inline-flex; align-items:center; justify-content:center; gap:6px;
  padding:10px 22px; border-radius:var(--r2);
  font-size:.88rem; font-weight:600; font-family:var(--sans);
  border:none; transition:var(--tr); cursor:pointer;
}
.btn-gold {
  background: var(--gold); color: var(--bg);
  font-weight:700;
}
.btn-gold:hover { background:var(--gold-hi); transform:translateY(-1px); box-shadow:0 6px 20px rgba(201,162,39,.3); }
.btn-gold:disabled { opacity:.4; transform:none; box-shadow:none; cursor:not-allowed; }
.btn-ghost {
  background:transparent; color:var(--txt);
  border:1px solid var(--bdr2);
}
.btn-ghost:hover { background:var(--bg3); border-color:var(--gold-lo); }
.btn-ghost:disabled { opacity:.4; cursor:not-allowed; }
.btn-danger {
  background:rgba(224,90,90,.1); color:var(--red);
  border:1px solid rgba(224,90,90,.25);
}
.btn-danger:hover { background:rgba(224,90,90,.2); }
.btn-sm  { padding:6px 14px; font-size:.78rem; }
.btn-xs  { padding:4px 10px; font-size:.72rem; }
.btn-full{ width:100%; }

/* ════════════════════════════════════════════
   FORMS
════════════════════════════════════════════ */
.fg { margin-bottom:1.2rem; }
.lbl {
  display:block; font-family:var(--mono);
  font-size:.68rem; font-weight:700; letter-spacing:.12em; text-transform:uppercase;
  color:var(--gold); margin-bottom:.55rem;
}
.inp, .sel, .tex {
  width:100%; background:var(--bg3);
  border:1px solid var(--bdr); border-radius:var(--r2);
  padding:11px 15px; color:var(--white);
  font-size:.93rem; transition:var(--tr); outline:none;
}
.inp:focus, .sel:focus, .tex:focus {
  border-color:var(--gold); box-shadow:0 0 0 3px var(--gold-dim);
}
.sel option { background:var(--bg); }
.tex { resize:vertical; min-height:80px; }
.frow { display:grid; grid-template-columns:1fr 1fr; gap:1rem; }
.frow3{ display:grid; grid-template-columns:1fr 1fr 1fr; gap:1rem; }

/* ════════════════════════════════════════════
   ALERTS
════════════════════════════════════════════ */
.alert { padding:12px 16px; border-radius:var(--r2); font-size:.88rem; margin-bottom:1rem; }
.alert-err  { background:rgba(224,90,90,.1);   border:1px solid rgba(224,90,90,.3);  color:#ff9090; }
.alert-ok   { background:rgba(62,207,142,.1);  border:1px solid rgba(62,207,142,.3); color:#7de8b5; }
.alert-inf  { background:var(--gold-dim);      border:1px solid rgba(201,162,39,.3); color:var(--gold-hi); }

/* ════════════════════════════════════════════
   LOADING
════════════════════════════════════════════ */
.loading { display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:240px; gap:1rem; color:var(--txt-m); font-size:.88rem; font-family:var(--mono); }
.spin { width:40px; height:40px; border:2px solid var(--bdr); border-top-color:var(--gold); border-radius:50%; animation:spin .7s linear infinite; }
@keyframes spin { to { transform:rotate(360deg); } }

/* ════════════════════════════════════════════
   QUIZ TAKING
════════════════════════════════════════════ */
.pbar-wrap { margin-bottom:1.6rem; }
.pbar-meta { display:flex; justify-content:space-between; font-family:var(--mono); font-size:.7rem; color:var(--txt-m); margin-bottom:.5rem; letter-spacing:.05em; }
.pbar { height:3px; background:var(--bg4); border-radius:2px; overflow:hidden; }
.pfill { height:100%; border-radius:2px; background:linear-gradient(90deg, var(--gold-lo), var(--gold-hi)); transition:width .35s ease; }
.q-timer {
  text-align:center; font-family:var(--mono);
  font-size:1.7rem; font-weight:700; color:var(--gold-hi);
  letter-spacing:.1em; margin-bottom:1.4rem;
}
.q-timer.danger { color:var(--red); animation:pulse 1s infinite; }
@keyframes pulse { 0%,100%{opacity:1}50%{opacity:.45} }
.q-num { font-family:var(--mono); font-size:.68rem; letter-spacing:.12em; text-transform:uppercase; color:var(--txt-m); margin-bottom:.5rem; }
.q-text {
  font-size:1.1rem; color:var(--white); margin-bottom:1.5rem; line-height:1.8;
}
.q-media { border-radius:var(--r2); overflow:hidden; margin-bottom:1.4rem; background:var(--bg3); border:1px solid var(--bdr); }
.q-media img   { width:100%; height:auto; max-height:420px; object-fit:contain; display:block; }
.q-media iframe{ width:100%; height:300px; border:none; display:block; }
.q-media-err   { padding:1.5rem; text-align:center; color:var(--txt-m); font-size:.85rem; }

/* MCQ */
.mcq-list  { display:flex; flex-direction:column; gap:.65rem; }
.mcq-opt {
  display:flex; align-items:center; gap:14px;
  padding:14px 18px; border-radius:var(--r2);
  border:1px solid var(--bdr); background:var(--bg3);
  cursor:pointer; transition:var(--tr);
}
.mcq-opt:hover { border-color:var(--gold-lo); background:var(--gold-dim); }
.mcq-opt.sel   { border-color:var(--gold); background:var(--gold-dim); }
.mcq-opt.ok    { border-color:var(--green); background:rgba(62,207,142,.08); }
.mcq-opt.ng    { border-color:var(--red);   background:rgba(224,90,90,.08); }
.mcq-letter {
  width:34px; height:34px; border-radius:50%; flex-shrink:0;
  display:flex; align-items:center; justify-content:center;
  font-family:var(--mono); font-weight:700; font-size:.82rem;
  background:var(--bg4); color:var(--txt-m); transition:var(--tr);
}
.mcq-opt.sel .mcq-letter { background:var(--gold); color:var(--bg); }
.mcq-opt.ok  .mcq-letter { background:var(--green); color:#fff; }
.mcq-opt.ng  .mcq-letter { background:var(--red); color:#fff; }
.mcq-text { font-size:.95rem; color:var(--txt); flex:1; }
.mcq-opt.sel .mcq-text { color:var(--white); }

.q-nav { display:flex; align-items:center; justify-content:space-between; gap:1rem; margin-top:2rem; }
.q-nav-mid { font-family:var(--mono); font-size:.75rem; color:var(--txt-m); letter-spacing:.06em; }

/* ════════════════════════════════════════════
   RESULTS
════════════════════════════════════════════ */
.results-hero { text-align:center; padding:2.5rem 0 2rem; }
.score-ring {
  width:160px; height:160px; border-radius:50%;
  border:3px solid var(--gold);
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  margin:0 auto 1.5rem;
  background: radial-gradient(circle, rgba(201,162,39,.08) 0%, transparent 70%);
  box-shadow: 0 0 50px rgba(201,162,39,.15);
}
.score-pct  { font-family:var(--serif); font-size:2.8rem; font-weight:900; color:var(--gold-hi); line-height:1; }
.score-sub  { font-family:var(--mono); font-size:.65rem; letter-spacing:.12em; color:var(--txt-m); margin-top:2px; }
.score-grade{ font-family:var(--serif); font-size:1.4rem; font-weight:700; color:var(--gold-hi); margin-bottom:.3rem; }
.score-detail{ font-family:var(--mono); font-size:.8rem; color:var(--txt-m); letter-spacing:.05em; }
.sigma-quote {
  max-width:480px; margin:1.5rem auto 0;
  background:var(--bg2); border:1px solid var(--bdr);
  border-left:3px solid var(--gold-lo);
  border-radius:var(--r2); padding:1rem 1.3rem;
  font-size:.88rem; color:var(--txt-m); font-style:italic;
}
.sigma-quote strong { color:var(--gold); font-style:normal; font-family:var(--mono); font-size:.68rem; letter-spacing:.1em; text-transform:uppercase; display:block; margin-bottom:.3rem; }
.res-item { border-bottom:1px solid var(--bdr); padding:1.3rem 0; }
.res-item:last-child { border-bottom:none; }
.res-q    { font-size:.95rem; color:var(--white); margin-bottom:.6rem; line-height:1.7; }
.res-stat { display:flex; align-items:center; gap:6px; font-weight:700; font-size:.82rem; margin-bottom:.4rem; }
.res-ok { color:var(--green); }
.res-ng { color:var(--red); }
.exp-box {
  background:rgba(201,162,39,.06); border:1px solid rgba(201,162,39,.15);
  border-radius:var(--r2); padding:12px 16px; margin-top:.8rem; font-size:.85rem; color:var(--txt-m);
}
.exp-box strong { color:var(--gold); display:block; font-family:var(--mono); font-size:.65rem; letter-spacing:.1em; text-transform:uppercase; margin-bottom:.3rem; }
.exp-box img { max-width:100%; border-radius:6px; margin-top:.6rem; }
.exp-box iframe { width:100%; height:200px; border-radius:6px; border:none; margin-top:.6rem; }

/* ════════════════════════════════════════════
   ADMIN DASHBOARD
════════════════════════════════════════════ */
.dash-header {
  display:flex; align-items:center; justify-content:space-between;
  margin-bottom:2rem; flex-wrap:wrap; gap:1rem;
  padding-bottom:1.5rem;
  border-bottom:1px solid var(--bdr);
}
.dash-title { font-family:var(--serif); font-size:1.6rem; color:var(--white); }
.dash-title span { color:var(--gold-hi); }
.kpi-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(170px,1fr)); gap:1rem; margin-bottom:2rem; }
.kpi {
  background:var(--bg2); border:1px solid var(--bdr); border-radius:var(--r);
  padding:1.3rem 1.5rem; position:relative; overflow:hidden;
  transition:var(--tr);
}
.kpi:hover { border-color:var(--gold-lo); }
.kpi::before { content:''; position:absolute; top:0; left:0; right:0; height:2px; }
.kpi.kpi-gold::before  { background:linear-gradient(90deg,var(--gold-lo),var(--gold-hi)); }
.kpi.kpi-green::before { background:linear-gradient(90deg,var(--green),#7de8b5); }
.kpi.kpi-blue::before  { background:linear-gradient(90deg,var(--blue),#7ab4ff); }
.kpi.kpi-purple::before{ background:linear-gradient(90deg,var(--purple),#c084fc); }
.kpi-val  { font-family:var(--serif); font-size:2.2rem; font-weight:900; color:var(--gold-hi); line-height:1; margin-bottom:.25rem; }
.kpi.kpi-green .kpi-val { color:var(--green); }
.kpi.kpi-blue  .kpi-val { color:var(--blue); }
.kpi.kpi-purple.kpi-val { color:var(--purple); }
.kpi-lbl  { font-family:var(--mono); font-size:.65rem; letter-spacing:.1em; text-transform:uppercase; color:var(--txt-m); }

<script>
// ════════════════════════════════════════════════════════════════
// CONFIG
// ════════════════════════════════════════════════════════════════
// ▼ YOUR LOGO: Upload logo.png to your GitHub repo root, then set this to:
//   https://YOUR_USERNAME.github.io/YOUR_REPO_NAME/logo.png
const LOGO_URL = 'ArmanShalik.github.io/mathlab-iqube/logo.png';

const A = {
  scriptUrl: localStorage.getItem('ml_url') || 'https://script.google.com/macros/s/AKfycby8qBZQEk20tBF68Bsqp7dTWJPrSyMmEQdAOLWNcVqAEbGMXjZVI_zjuZGEGv48e2amvA/exec',

  s: {

    qIdx:0, answers:[], startTime:null,
    student:null, timeLeft:0, timerID:null,
    lastRes:null, adminQuizzes:[], editQuiz:null,
    editQs:[], editStudents:[], dashStats:null,
    searchQ:'', filterLevel:'', filterCat:''
  }
};

// ════════════════════════════════════════════════════════════════
// SIGMA QUOTES (shown on low scores)
// ════════════════════════════════════════════════════════════════
const SIGMA_QUOTES = [
  "The sigma doesn't fear failure. He dissects it. Open your textbook tonight.",
  "Grind in silence. Let the results make noise. You know what to review.",
  "Average is the enemy of excellence. Every mistake is a lesson paid for.",
  "The wolf doesn't lose sleep over the opinion of sheep. He sharpens his skills.",
  "Pain is temporary. A weak result is a message. Read it and respond.",
  "You didn't fail. You discovered exactly what needs more work. That's data.",
  "Every master was once a student who refused to stay average. Your move.",
  "Discipline is choosing between what you want now and what you want most.",
  "The comeback is always stronger than the setback. Start the review now.",
  "Hard work beats talent when talent doesn't work hard. Prove it next time."
];

// ════════════════════════════════════════════════════════════════
// UTILS
// ════════════════════════════════════════════════════════════════
const $     = id => document.getElementById(id);
const render= (id,html) => { const e=$(id); if(e) e.innerHTML=html; };

function toast(msg, type='') {
  const t = document.createElement('div');
  t.className = 'toast ' + type; t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 3800);
}

function esc(s) {
  return String(s??'')
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#039;');
}
function fmtTime(s) {
  return `${String(Math.floor(s/60)).padStart(2,'0')}:${String(s%60).padStart(2,'0')}`;
}
function ytId(url) {
  const m = (url||'').match(/(?:v=|youtu\.be\/|embed\/)([^&?#\s]{11})/);
  return m?m[1]:'';
}
function csvParse(text) {
  return text.split('\n').map(l=>l.trim()).filter(Boolean).slice(1)
    .map(line => { const p=line.split(',').map(c=>c.trim().replace(/^"|"$/g,'')); return {indexNumber:p[0],studentName:p[1]||''}; })
    .filter(r=>r.indexNumber);
}
function navigate(path) { window.location.hash = path; }

// Fix Google Drive image URLs for direct embedding
function fixImgUrl(url) {
  if (!url) return '';
  // Convert "uc?export=view&id=ID" → direct thumbnail
  const m1 = url.match(/\/d\/([a-zA-Z0-9_-]+)\//);
  const m2 = url.match(/[?&]id=([a-zA-Z0-9_-]+)/);
  const id  = m1?m1[1] : m2?m2[1] : null;
  if (id && url.includes('drive.google.com')) {
    return `https://drive.google.com/thumbnail?id=${id}&sz=w1200`;
  }
  return url;
}

// Render text that may contain LaTeX: $...$ inline, $$...$$ display
function renderMath(rawText) {
  if (!rawText) return '';
  // Escape HTML first, then render KaTeX
  let text = rawText;
  // We need to handle LaTeX before escaping
  const parts = [];
  // Split on $$...$$ first (display)
  const display = text.split('$$');
  let result = '';
  for (let i=0; i<display.length; i++) {
    if (i%2===1) {
      try {
        result += katex.renderToString(display[i], {displayMode:true, throwOnError:false});
      } catch(e) { result += '$$'+esc(display[i])+'$$'; }
    } else {
      // Now handle inline $...$
      const inline = display[i].split(/(?<!\$)\$(?!\$)/);
      let inResult = '';
      for (let j=0; j<inline.length; j++) {
        if (j%2===1) {
          try {
            inResult += katex.renderToString(inline[j], {displayMode:false, throwOnError:false});
          } catch(e) { inResult += '$'+esc(inline[j])+'$'; }
        } else {
          inResult += esc(inline[j]);
        }
      }
      result += inResult;
    }
  }
  return result;
}

// Wait for KaTeX to load
function whenKatex(fn) {
  if (typeof katex !== 'undefined') return fn();
  let tries = 0;
  const t = setInterval(()=>{ tries++; if(typeof katex!=='undefined'){clearInterval(t);fn();} if(tries>40)clearInterval(t); },100);
}

function levelColor(lvl) {
  const map = {Easy:'var(--lv-easy)',Medium:'var(--lv-medium)',Advanced:'var(--lv-advanced)',Olympiad:'var(--lv-olympiad)'};
  return map[lvl]||'var(--gold)';
}
function levelChip(lvl) {
  if (!lvl) return '';
  const cls = {Easy:'chip-easy',Medium:'chip-medium',Advanced:'chip-advanced',Olympiad:'chip-olympiad'};
  const ico  = {Easy:'◎',Medium:'◈',Advanced:'◉',Olympiad:'★'};
  return `<span class="chip ${cls[lvl]||'chip-easy'}">${ico[lvl]||'•'} ${esc(lvl)}</span>`;
}

// ════════════════════════════════════════════════════════════════
// API
// ════════════════════════════════════════════════════════════════
async function apiGet(action, params={}) {
  if (!A.scriptUrl || A.scriptUrl.includes('PASTE_YOUR')) throw new Error('No backend URL configured');
  const url = new URL(A.scriptUrl);
  url.searchParams.set('action', action);
  Object.entries(params).forEach(([k,v])=>url.searchParams.set(k,String(v)));
  const r = await fetch(url.toString());
  if (!r.ok) throw new Error(`HTTP ${r.status}`);
  return r.json();
}
async function apiPost(action, data={}) {
  if (!A.scriptUrl || A.scriptUrl.includes('PASTE_YOUR')) throw new Error('No backend URL configured');
  const r = await fetch(A.scriptUrl, {
    method:'POST', headers:{'Content-Type':'text/plain;charset=utf-8'},
    body: JSON.stringify({action,...data})
  });
  if (!r.ok) throw new Error(`HTTP ${r.status}`);
  return r.json();
}

// ════════════════════════════════════════════════════════════════
// ROUTER
// ════════════════════════════════════════════════════════════════
window.addEventListener('hashchange', route);
window.addEventListener('load', route);

async function route() {
  if (!A.scriptUrl || A.scriptUrl.includes('PASTE_YOUR')) { showSetup(); return; }
  navBar();
  const h     = window.location.hash.replace('#','').replace(/^\//,'');
  const parts = h.split('/').filter(Boolean);
  const p     = parts[0] || 'home';

  if (!p || p==='home')                         await showHome();
  else if (p==='quiz'    && parts[1])            await showQuizStart(parts[1]);
  else if (p==='mathlab' && parts[1])            await showMathLab(parts[1]);
  else if (p==='take')                            showTaking();
  else if (p==='results')                         showResults();
  else if (p==='setup')                           showSetup();
  else if (p==='admin') {
    if (!parts[1]) {
      if (!A.adminPw) { navigate('/admin/login'); return; }
      await showDash();
    } else if (parts[1]==='login')               showLogin();
    else if (parts[1]==='quiz') {
      if (parts[2]==='new')                       showEditor(null);
      else if (parts[3]==='edit')                 await showEditor(parts[2]);
      else if (parts[3]==='analytics')            await showAnalytics(parts[2]);
    }
  } else await showHome();
}

// ════════════════════════════════════════════════════════════════
// NAVBAR
// ════════════════════════════════════════════════════════════════
function navBar() {
  $('navbar').innerHTML = `<div class="nav-inner">
    <div class="nav-brand" onclick="navigate('/home')">
      <div class="nav-mark">${logoImg()}</div>
      <div class="nav-title">MathLab <span>IQube</span></div>
    </div>
    <div class="nav-links">

      ${A.adminPw
        ? `<button class="nav-btn" onclick="navigate('/admin')">Dashboard</button>
           <button class="nav-btn" onclick="adminLogout()">Logout</button>`
        : `<button class="nav-btn-gold" onclick="navigate('/admin/login')">Admin</button>`}
    </div>
  </div>`;
}
function hasLogo() { return LOGO_URL && !LOGO_URL.includes('YOUR_USERNAME'); }
function logoImg(cls='') { return hasLogo() ? `<img src="https://${LOGO_URL}" class="${cls}" alt="MathLab IQube" onerror="this.style.display='none'">` : `<svg viewBox="0 0 48 48" fill="none"><path d="M8 14l16 12 16-12" stroke="#c9a227" stroke-width="4.5" stroke-linecap="round"/><path d="M8 27l16 12 16-12" stroke="#c9a227" stroke-width="4.5" stroke-linecap="round"/></svg>`; }
function adminLogout() {

}

// ════════════════════════════════════════════════════════════════
// SETUP
// ════════════════════════════════════════════════════════════════
function showSetup() {
  $('navbar').innerHTML=`<div class="nav-inner"><div class="nav-brand"><div class="nav-mark">${logoImg()}</div><div class="nav-title">MathLab <span>IQube</span></div></div></div>`;
  $('app').innerHTML=`<div class="main"><div class="setup-wrap">
    <div class="card">
      <div style="text-align:center;margin-bottom:2rem">
        <div class="portal-logo" style="margin-bottom:1.2rem">${logoImg()}</div>

        <p style="color:var(--txt-m);font-size:.88rem;margin-top:.5rem">Paste your Google Apps Script Web App URL</p>
      </div>
      <div class="fg">
        <label class="lbl">Apps Script Web App URL</label>
        <input class="inp" id="su-url" type="url"
          placeholder="https://script.google.com/macros/s/.../exec"

      </div>
      <button class="btn btn-gold btn-full" onclick="saveSetup()">Connect Platform</button>
      <p style="text-align:center;color:var(--txt-m);font-size:.75rem;margin-top:1rem;font-family:var(--mono)">See README.md for setup instructions</p>
    </div>
  </div></div>`;
}
function saveSetup() {
  const url = ($('su-url')||{}).value?.trim();
  if (!url||!url.includes('script.google.com')){toast('Enter a valid Apps Script URL','err');return;}
  A.scriptUrl=url; localStorage.setItem('ml_url',url); navigate('/home');
}

// ════════════════════════════════════════════════════════════════
// HOME
// ════════════════════════════════════════════════════════════════
async function showHome() {
  $('app').innerHTML=`<div class="main">
    ${portalHeroHTML()}
    <div class="loading"><div class="spin"></div></div>
  </div>`;
  try {
    const d = await apiGet('getQuizzes');
    if (!d.success) throw new Error(d.error);
    A.s.quizzes = d.quizzes||[];
    A.s.filtered= [...A.s.quizzes];
    A.s.searchQ=''; A.s.filterLevel=''; A.s.filterCat='';
    paintHome();
  } catch(e) {
    $('app').innerHTML=`<div class="main">${portalHeroHTML()}<div class="alert alert-err" style="max-width:600px;margin:0 auto">
      Could not load quizzes: ${esc(e.message)}.
      <a href="#" onclick="showHome()" style="color:inherit;text-decoration:underline;margin-left:.4rem">Retry</a>
    </div></div>`;
  }
}

function portalHeroHTML() {
  return `<div class="portal-hero">
    <div class="portal-logo">${logoImg()}</div>
    <div class="portal-title">MathLab <span>IQube</span></div>
    <div class="portal-sub">Arman Teaches Math · Quiz Platform</div>
    <div class="portal-divider"><span>A/L &nbsp;·&nbsp; 2027</span></div>
  </div>`;
}

function paintHome() {
  const qs = A.s.filtered;
  $('app').innerHTML=`<div class="main">
    ${portalHeroHTML()}
    <div class="search-bar">
      <div class="t-label search-label">Find a Quiz</div>
      <div class="search-row">
        <input class="search-inp" id="srch" type="text" placeholder="Search by title or description…"
          value="${esc(A.s.searchQ)}" oninput="filterQuizzes()">
        <select class="filter-sel" id="flvl" onchange="filterQuizzes()">
          <option value="">All Levels</option>
          <option value="Easy"     ${A.s.filterLevel==='Easy'    ?'selected':''}>◎ Easy</option>
          <option value="Medium"   ${A.s.filterLevel==='Medium'  ?'selected':''}>◈ Medium</option>
          <option value="Advanced" ${A.s.filterLevel==='Advanced'?'selected':''}>◉ Advanced</option>
          <option value="Olympiad" ${A.s.filterLevel==='Olympiad'?'selected':''}>★ Olympiad</option>
        </select>
        <select class="filter-sel" id="fcat" onchange="filterQuizzes()">
          <option value="">All Types</option>
          <option value="Open"    ${A.s.filterCat==='Open'   ?'selected':''}>🌐 Open</option>
          <option value="MathLab" ${A.s.filterCat==='MathLab'?'selected':''}>🔒 MathLab</option>
        </select>
      </div>
    </div>
    ${!qs.length
      ? `<div class="empty"><div class="empty-ico">📋</div><h3>No quizzes found</h3><p style="margin-top:.4rem;font-size:.85rem">Try adjusting your search or filters.</p></div>`
      : `<div class="quiz-grid">${qs.map(qCardHTML).join('')}</div>`}
  </div>`;
}

function filterQuizzes() {
  const srch = ($('srch')||{}).value?.toLowerCase()||'';
  const lvl  = ($('flvl')||{}).value||'';
  const cat  = ($('fcat')||{}).value||'';
  A.s.searchQ=srch; A.s.filterLevel=lvl; A.s.filterCat=cat;
  A.s.filtered = A.s.quizzes.filter(q => {
    const matchText = !srch || q.title.toLowerCase().includes(srch) || (q.description||'').toLowerCase().includes(srch);
    const matchLvl  = !lvl  || q.level === lvl;
    const matchCat  = !cat  || q.category === cat;
    return matchText && matchLvl && matchCat;
  });
  const grid = document.querySelector('.quiz-grid');
  const empty= document.querySelector('.empty');
  if (A.s.filtered.length) {
    if (grid) grid.innerHTML = A.s.filtered.map(qCardHTML).join('');
    else document.querySelector('.search-bar').insertAdjacentHTML('afterend',`<div class="quiz-grid">${A.s.filtered.map(qCardHTML).join('')}</div>`);
    if (empty) empty.remove();
  } else {
    if (grid)  grid.innerHTML = '';
    if (!empty) document.querySelector('.search-bar').insertAdjacentHTML('afterend',`<div class="empty"><div class="empty-ico">🔍</div><h3>No quizzes match your filters</h3></div>`);
  }
}

function qCardHTML(q) {
  const lc  = levelColor(q.level);
  return `<div class="qcard" onclick="go('${esc(q.id)}','${esc(q.category)}')" style="--accent:${lc}">
    <div class="qcard-accent" style="background:${lc}"></div>
    <div class="qcard-top">
      <div class="qcard-badges">
        ${levelChip(q.level)}
        <span class="chip ${q.category==='MathLab'?'chip-mathlab':'chip-open'}">${q.category==='MathLab'?'🔒 MathLab':'🌐 Open'}</span>
      </div>
    </div>
    <h3>${esc(q.title)}</h3>
    <div class="qcard-desc">${esc(q.description||'')}</div>
    <div class="qcard-meta">
      <span>⏱ ${q.timeLimit>0?q.timeLimit+' min':'Untimed'}</span>
      <span>🔁 ${q.attemptLimit>0?q.attemptLimit+' attempt'+(q.attemptLimit>1?'s':''):'Unlimited'}</span>
    </div>
    <button class="btn btn-gold btn-sm" style="width:100%">
      ${q.category==='MathLab'?'Verify & Start →':'Start Quiz →'}
    </button>
  </div>`;
}

function go(id, cat) {
  if (cat==='MathLab') navigate(`/mathlab/${id}`);
  else navigate(`/quiz/${id}`);
}

async function showQuizStart(id) {

  try {
    const d = await apiGet('getQuiz',{id});
    if(!d.success) throw new Error(d.error);
    A.s.currentQuiz=d.quiz; A.s.student=null;
    const q=d.quiz;
    $('app').innerHTML=`<div class="main"><div style="max-width:560px;margin:0 auto">
      <div class="card">
        <div class="qcard-badges" style="margin-bottom:1rem">
          ${levelChip(q.level)}
          <span class="chip chip-open">🌐 Open Quiz</span>
        </div>
        <h2 class="t-serif t-white" style="font-size:1.4rem;margin-bottom:.4rem">${esc(q.title)}</h2>
        <p style="color:var(--txt-m);margin-bottom:1.2rem;font-size:.88rem">${esc(q.description||'')}</p>
        <div class="qcard-meta" style="font-size:.82rem;margin-bottom:1.3rem">
          <span>📝 ${(q.questions||[]).length} questions</span>
          ${q.timeLimit>0?`<span>⏱ ${q.timeLimit} min</span>`:''}
          ${q.attemptLimit>0?`<span>🔁 Max ${q.attemptLimit} attempt${q.attemptLimit>1?'s':''}</span>`:''}
        </div>
        <div class="alert alert-inf" style="margin-bottom:1.2rem;font-size:.82rem">

// ════════════════════════════════════════════════════════════════
// QUIZ TAKING + ANTI-CHEAT
// ════════════════════════════════════════════════════════════════
function startTaking() {
  const quiz=A.s.currentQuiz;
  if(!quiz||!quiz.questions?.length){toast('Quiz has no questions','err');navigate('/home');return;}
  A.s.qIdx=0;
  A.s.answers=quiz.questions.map(q=>({questionId:q.id,answer:''}));
  A.s.startTime=new Date().toISOString();
  A.s.timeLeft=(quiz.timeLimit||0)*60;
  A.s.violations=0;
  if(A.s.timerID){clearInterval(A.s.timerID);A.s.timerID=null;}
  if(quiz.timeLimit>0){
    A.s.timerID=setInterval(()=>{
      A.s.timeLeft--;
      const t=$('qtimer');
      if(t){t.textContent='⏱ '+fmtTime(A.s.timeLeft);t.className='q-timer'+(A.s.timeLeft<60?' danger':'');}
      if(A.s.timeLeft<=0){clearInterval(A.s.timerID);A.s.timerID=null;doSubmit();}
    },1000);
  }
  // Anti-cheat: tab switch detection
  const handleBlur=()=>{
    if(window.location.hash.includes('take')){
      A.s.violations=(A.s.violations||0)+1;
      const viol=A.s.violations;
      const overlay=document.createElement('div');
      overlay.id='ac-overlay';
      overlay.style.cssText='position:fixed;inset:0;background:rgba(8,11,20,.97);z-index:9000;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1rem;padding:2rem;text-align:center';
      overlay.innerHTML=`<div style="font-size:2.5rem">${viol>=3?'🚫':'⚠️'}</div>
        <div style="font-family:var(--serif);font-size:1.3rem;color:var(--white)">${viol>=3?'Quiz Auto-Submitted':'Tab Switch Detected'}</div>
        <div style="color:var(--txt-m);font-size:.88rem;max-width:380px">${viol>=3
          ? 'You switched tabs 3 times. Your quiz has been submitted automatically.'
          : `Warning ${viol}/3: Switching tabs or windows during a quiz is not allowed. A third violation will auto-submit your quiz.`}</div>
        ${viol<3?`<button onclick="document.getElementById('ac-overlay').remove()" style="margin-top:.5rem;padding:10px 24px;background:var(--gold);color:var(--bg);border:none;border-radius:6px;font-weight:700;cursor:pointer;font-family:var(--sans)">Return to Quiz</button>`:''}`;
      document.body.appendChild(overlay);
      if(viol>=3){setTimeout(doSubmit,2000);}
    }
  };
  document.removeEventListener('visibilitychange',window._mlBlurHandler||null);
  window._mlBlurHandler=()=>{if(document.hidden)handleBlur();};
  document.addEventListener('visibilitychange',window._mlBlurHandler);
  navigate('/take');
  showTaking();
}

function showTaking() {
  const quiz=A.s.currentQuiz;
  if(!quiz){navigate('/home');return;}
  const qi=A.s.qIdx, q=quiz.questions[qi], tot=quiz.questions.length;
  const ans=A.s.answers[qi]?.answer||'';
  const pct=((qi+1)/tot)*100;

  // Media
  let mediaHtml='';
  if(q.questionMedia){
    const isYT=q.questionType==='youtube'||(q.questionMedia||'').includes('youtu');
    if(isYT){
      const vid=ytId(q.questionMedia);
      mediaHtml=vid?`<div class="q-media"><iframe src="https://www.youtube.com/embed/${vid}?rel=0" allowfullscreen></iframe></div>`:'';
    } else {
      const imgUrl=fixImgUrl(q.questionMedia);
      mediaHtml=`<div class="q-media" id="qmedia_${qi}">
        <img src="${esc(imgUrl)}" alt="Question image"
          onload="this.style.display='block'"
          onerror="document.getElementById('qmedia_${qi}').innerHTML='<div class=\\'q-media-err\\'>⚠ Image could not be loaded</div>'">
      </div>`;
    }
  }

  // Answer input
  let ansHtml='';
  if(q.answerType==='mcq'){
    ansHtml=`<div class="mcq-list">${(q.options||[]).map((opt,i)=>`
      <div class="mcq-opt${ans===String(i)?' sel':''}" onclick="pickMCQ(${i})">
        <div class="mcq-letter">${'ABCDE'[i]}</div>
        <div class="mcq-text" id="mcq_opt_${i}"></div>
      </div>`).join('')}</div>`;
  } else if(q.answerType==='numerical'){
    ansHtml=`<div class="fg">
      <label class="lbl">Your Answer (number)</label>
      <input class="inp" id="nans" type="number" step="any" value="${esc(ans)}"
        style="font-size:1.2rem;text-align:center;max-width:240px;display:block;margin:0 auto"
        oninput="A.s.answers[A.s.qIdx].answer=this.value">
    </div>`;
  } else {
    ansHtml=`<div class="fg">
      <label class="lbl">Your Answer</label>
      <input class="inp" id="tans" type="text" value="${esc(ans)}" placeholder="Type your answer"
        oninput="A.s.answers[A.s.qIdx].answer=this.value">
    </div>`;
  }

  $('app').innerHTML=`<div class="main"><div style="max-width:700px;margin:0 auto">
    <div class="pbar-wrap">
      <div class="pbar-meta">
        <span>Question ${qi+1} of ${tot}</span>
        <span>${Math.round(pct)}% complete</span>
      </div>
      <div class="pbar"><div class="pfill" style="width:${pct}%"></div></div>
    </div>
    ${quiz.timeLimit>0?`<div class="q-timer${A.s.timeLeft<60?' danger':''}" id="qtimer">⏱ ${fmtTime(A.s.timeLeft)}</div>`:''}
    <div class="card">
      <div class="q-num">Question ${qi+1}</div>
      <div class="q-text" id="qtext"></div>
      ${mediaHtml}
      <div id="ans-area">${ansHtml}</div>
    </div>
    <div class="q-nav">
      <button class="btn btn-ghost" onclick="prevQ()" ${qi===0?'disabled':''}>← Previous</button>
      <span class="q-nav-mid">${qi+1} / ${tot}</span>
      ${qi<tot-1
        ?`<button class="btn btn-gold" onclick="nextQ()">Next →</button>`
        :`<button class="btn btn-gold" onclick="confirmSub()">Submit Quiz ✓</button>`}
    </div>
  </div></div>`;

  // Render LaTeX after DOM is ready
  whenKatex(()=>{
    const qtEl=$('qtext');
    if(qtEl) qtEl.innerHTML = renderMath(q.questionText);
    // Render MCQ option text with LaTeX
    if(q.answerType==='mcq'){
      (q.options||[]).forEach((opt,i)=>{
        const el=$(`mcq_opt_${i}`);
        if(el) el.innerHTML = renderMath(opt);
      });
    }
  });
}

function pickMCQ(i){A.s.answers[A.s.qIdx].answer=String(i);showTaking();}
function prevQ(){if(A.s.qIdx>0){A.s.qIdx--;showTaking();}}
function nextQ(){if(A.s.qIdx<A.s.currentQuiz.questions.length-1){A.s.qIdx++;showTaking();}}
function confirmSub(){
  const blank=A.s.answers.filter(a=>!a.answer).length;
  if(blank>0&&!confirm(`${blank} question${blank>1?'s are':' is'} unanswered. Submit anyway?`))return;
  doSubmit();
}
async function doSubmit(){
  if(A.s.timerID){clearInterval(A.s.timerID);A.s.timerID=null;}
  // Remove anti-cheat listener
  if(window._mlBlurHandler){document.removeEventListener('visibilitychange',window._mlBlurHandler);window._mlBlurHandler=null;}
  $('app').innerHTML=`<div class="main"><div class="loading"><div class="spin"></div><p>Submitting your quiz…</p></div></div>`;
  try {
    const d=await apiPost('submitAttempt',{
      quizId:A.s.currentQuiz.id,
      studentIndex:A.s.student?.index||'',
      studentName:A.s.student?.name||'Anonymous',
      email:A.s.student?.email||'',
      phone:A.s.student?.phone||'',
      answers:JSON.stringify(A.s.answers),
      startTime:A.s.startTime,
      endTime:new Date().toISOString()
    });
    if(!d.success)throw new Error(d.error||'Submission failed');
    A.s.lastRes={...d,quiz:A.s.currentQuiz,student:A.s.student};
    navigate('/results');
    showResults();
  } catch(e){
    $('app').innerHTML=`<div class="main">
      <div class="alert alert-err">Submission failed: ${esc(e.message)}</div>
      <button class="btn btn-ghost" style="margin-top:1rem" onclick="doSubmit()">Retry</button>
    </div>`;
  }
}

  let maxStreak=0,curStreak=0;

    <!-- Score stats bar -->
    <div class="card" style="padding:1rem 1.4rem;margin-bottom:1.2rem;display:flex;gap:2rem;flex-wrap:wrap;justify-content:center">
      <div style="text-align:center"><div style="font-family:var(--serif);font-size:1.6rem;color:var(--green)">${score}</div><div style="font-family:var(--mono);font-size:.62rem;color:var(--txt-m);text-transform:uppercase;letter-spacing:.08em">Correct</div></div>
      <div style="text-align:center"><div style="font-family:var(--serif);font-size:1.6rem;color:var(--red)">${total-score}</div><div style="font-family:var(--mono);font-size:.62rem;color:var(--txt-m);text-transform:uppercase;letter-spacing:.08em">Wrong</div></div>
      <div style="text-align:center"><div style="font-family:var(--serif);font-size:1.6rem;color:var(--gold-hi)">${maxStreak}</div><div style="font-family:var(--mono);font-size:.62rem;color:var(--txt-m);text-transform:uppercase;letter-spacing:.08em">Best Streak</div></div>
      <div style="text-align:center"><div style="font-family:var(--serif);font-size:1.6rem;color:var(--blue)">${(gradedAnswers||[]).filter(a=>!a.answer).length}</div><div style="font-family:var(--mono);font-size:.62rem;color:var(--txt-m);text-transform:uppercase;letter-spacing:.08em">Skipped</div></div>

function renderReview(gradedAnswers, quiz){
  const body=$('review-body'); if(!body)return;
  const review=(gradedAnswers||[]).map((a,i)=>{
    const q=quiz.questions[i]; if(!q)return'';
    const opts=q.options||[];
    const ua=q.answerType==='mcq'?(opts[parseInt(a.answer)]??'(no answer)'):(a.answer||'(no answer)');
    const ca=q.answerType==='mcq'?(opts[parseInt(a.correctAnswer ?? '')]??''):(a.correctAnswer??'');
    const exp=a.explanation||{};
    const expHtml=(exp.text||exp.image||exp.youtube)?`<div class="exp-box">
      <strong>💡 Explanation</strong>
      ${exp.text?`<span id="exp_text_${i}"></span>`:''}
      ${exp.image?`<br><img src="${esc(fixImgUrl(exp.image))}" onerror="this.style.display='none'">`:''}
      ${exp.youtube&&ytId(exp.youtube)?`<br><iframe src="https://www.youtube.com/embed/${ytId(exp.youtube)}" allowfullscreen></iframe>`:''}
    </div>`:'';
    return `<div class="res-item">
      <div class="t-mono" style="font-size:.65rem;letter-spacing:.1em;color:var(--txt-m);margin-bottom:.3rem;text-transform:uppercase">Q${i+1}</div>
      <div class="res-q" id="res_q_${i}"></div>
      <div class="res-stat ${a.correct?'res-ok':'res-ng'}">${a.correct?'✓ Correct':'✗ Incorrect'}</div>
      <div style="font-size:.85rem;color:var(--txt-m)">
        Your answer: <strong style="color:var(--txt)" id="res_ua_${i}"></strong>
        ${!a.correct&&String(ca)?` &nbsp;·&nbsp; Correct: <strong style="color:var(--green)" id="res_ca_${i}"></strong>`:''}
      </div>
      ${expHtml}
    </div>`;
  }).join('');
  body.innerHTML=review||'<p class="t-muted">No review data.</p>';
  whenKatex(()=>{
    (gradedAnswers||[]).forEach((a,i)=>{
      const q=quiz.questions[i]; if(!q)return;
      const el=$(`res_q_${i}`); if(el) el.innerHTML=renderMath(q.questionText);
      const opts=q.options||[];
      const uaEl=$(`res_ua_${i}`), caEl=$(`res_ca_${i}`);
      const ua=q.answerType==='mcq'?(opts[parseInt(a.answer)]??'(no answer)'):(a.answer||'(no answer)');
      const ca=q.answerType==='mcq'?(opts[parseInt(a.correctAnswer??'')]??''):(a.correctAnswer??'');
      if(uaEl) uaEl.innerHTML=renderMath(String(ua));
      if(caEl) caEl.innerHTML=renderMath(String(ca));
      const expEl=$(`exp_text_${i}`), exp=a.explanation||{};
      if(expEl&&exp.text) expEl.innerHTML=renderMath(exp.text);
    });
  });
}

async function submitLead(){
  const phone=($('lead-phone')||{}).value?.trim();
  const email=($('lead-email')||{}).value?.trim();
  if(!phone&&!email){render('lead-err','<div class="alert alert-err" style="margin-bottom:.8rem">Please enter your WhatsApp number to unlock.</div>');return;}
  // Store in session
  if(A.s.student){A.s.student.phone=phone;A.s.student.email=email;}
  A.s.lastRes.student={...A.s.lastRes.student,phone,email};
  // Save contact info to backend by re-submitting just the contact (cheap API call)
  // We update the student record in-session only; Sheets already has the attempt row
  // Show discussion
  const gate=$('lead-gate');
  if(gate){gate.outerHTML=`<div class="card" id="review-section"><div class="section-title">Answer Discussion</div><div id="review-body"><div class="loading" style="min-height:80px"><div class="spin"></div></div></div></div>`;}
  renderReview(A.s.lastRes.gradedAnswers, A.s.lastRes.quiz);
  toast('Discussion unlocked! 🎉','ok');
}

function shareResult(pct, title){

}

function weeklyChart(days){
  if(!days||!days.length) return '';
  const max=Math.max(...days.map(d=>d.count),1);
  const W=310, H=80, pad=8, bw=Math.floor((W-pad*2)/days.length)-4;
  const bars=days.map((d,i)=>{
    const bh=Math.max(3,Math.round((d.count/max)*(H-20)));
    const x=pad+i*(bw+4);
    const y=H-14-bh;
    return `<rect x="${x}" y="${y}" width="${bw}" height="${bh}" fill="var(--gold)" rx="2" opacity=".85"/>
      <text x="${x+bw/2}" y="${H-3}" text-anchor="middle" font-size="8" fill="var(--txt-m)" font-family="Space Mono">${d.day}</text>
      ${d.count>0?`<text x="${x+bw/2}" y="${y-3}" text-anchor="middle" font-size="8" fill="var(--gold-hi)" font-family="Space Mono">${d.count}</text>`:''}`;
  }).join('');
  return `<svg viewBox="0 0 ${W} ${H}" width="100%" style="display:block">${bars}</svg>`;
}

async function downloadDB(category){
  try{
    toast('Preparing download…');
    const d=await apiPost('getFullDatabase',{password:A.adminPw,category});
    if(!d.success)throw new Error(d.error);
    if(!d.data.length){toast('No data found for this filter','err');return;}
    const keys=Object.keys(d.data[0]);
    const csv=[keys.join(','),...d.data.map(r=>keys.map(k=>`"${String(r[k]??'').replace(/"/g,'""')}"`).join(','))].join('\n');
    const blob=new Blob([csv],{type:'text/csv'});
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');
    a.href=url;a.download=`mathlab_${category}_${new Date().toISOString().slice(0,10)}.csv`;
    a.click();URL.revokeObjectURL(url);
    toast(`Downloaded ${d.data.length} records`,'ok');
  }catch(e){toast('Download failed: '+e.message,'err');}
}

async function delQuiz(id,title){
  if(!confirm(`Archive quiz "${title}"?\n\nHidden from students; data preserved.`))return;
  try{
    const d=await apiPost('deleteQuiz',{password:A.adminPw,quizId:id});
    if(d.success){toast('Quiz archived','ok');await showDash();}
    else throw new Error(d.error);
  }catch(e){toast('Error: '+e.message,'err');}
}

function setCA(qi,v){A.s.editQs[qi].correctAnswer=String(v);}
function setExp(qi,f,v){if(!A.s.editQs[qi].explanation)A.s.editQs[qi].explanation={};A.s.editQs[qi].explanation[f]=v;}

function paintQs(){return A.s.editQs.length?A.s.editQs.map((q,i)=>paintQForm(q,i)).join(''):''}

function paintQForm(q,i){
  const tot=A.s.editQs.length, ALPHA='ABCDE';
  const opts=(q.options||['','','','']).map((o,oi)=>`
    <div class="opt-row">
      <input type="radio" class="opt-radio" name="ca${i}" value="${oi}" ${q.correctAnswer===String(oi)?'checked':''} onchange="setCA(${i},'${oi}')">
      <span class="opt-letter">${ALPHA[oi]}.</span>
      <input class="inp" type="text" value="${esc(o)}" placeholder="Option ${ALPHA[oi]}" style="flex:1" oninput="setOpt(${i},${oi},this.value)">
    </div>`).join('');
  const exp=q.explanation||{};
  return `<div class="qb-card">
    <div class="qb-hdr">
      <span class="qb-num">Question ${i+1}</span>
      <div style="display:flex;gap:.35rem">
        <button class="btn btn-ghost btn-xs" onclick="moveQ(${i},-1)" ${i===0?'disabled':''}>↑</button>
        <button class="btn btn-ghost btn-xs" onclick="moveQ(${i},1)"  ${i===tot-1?'disabled':''}>↓</button>
        <button class="btn btn-danger btn-xs" onclick="removeQ(${i})">✕</button>
      </div>
    </div>
    <div class="fg">
      <label class="lbl">Question Text * (LaTeX OK: $x^2$ or $$\\int f dx$$)</label>
      <textarea class="tex" rows="2" placeholder="e.g. Solve $$x^2 - 5x + 6 = 0$$"
        onchange="setQF(${i},'questionText',this.value)">${esc(q.questionText||'')}</textarea>
    </div>
    <div class="frow">
      <div class="fg">
        <label class="lbl">Question Type</label>
        <select class="sel" onchange="setQF(${i},'questionType',this.value)">
          <option value="text"    ${q.questionType==='text'   ?'selected':''}>Text Only</option>
          <option value="image"   ${q.questionType==='image'  ?'selected':''}>Image</option>
          <option value="youtube" ${q.questionType==='youtube'?'selected':''}>YouTube Video</option>
        </select>
      </div>
      <div class="fg">
        <label class="lbl">Answer Type</label>
        <select class="sel" onchange="setQF(${i},'answerType',this.value)">
          <option value="mcq"       ${q.answerType==='mcq'      ?'selected':''}>Multiple Choice (MCQ)</option>
          <option value="numerical" ${q.answerType==='numerical'?'selected':''}>Numerical</option>
          <option value="text"      ${q.answerType==='text'     ?'selected':''}>Short Text</option>
        </select>
      </div>
    </div>
    ${q.questionType!=='text'?`<div class="fg">
      <label class="lbl">${q.questionType==='youtube'?'YouTube URL':'Image URL'}</label>
      <div style="display:flex;gap:.5rem;flex-wrap:wrap">
        <input class="inp" type="url" value="${esc(q.questionMedia||'')}" style="flex:1;min-width:200px"
          placeholder="${q.questionType==='youtube'?'https://youtube.com/watch?v=...':'https://...'}"
          oninput="setQF(${i},'questionMedia',this.value)">
        ${q.questionType==='image'?`<button class="btn btn-ghost btn-sm" onclick="$('imgup${i}').click()">Upload</button>
          <input type="file" id="imgup${i}" accept="image/*" style="display:none" onchange="uploadMedia(${i},this)">`:``}
      </div>
    </div>`:''}
    ${q.answerType==='mcq'
      ?`<div class="fg"><label class="lbl">Options (radio = correct answer · LaTeX OK in options)</label>
          ${opts}
          <button class="btn btn-ghost btn-xs" style="margin-top:.4rem" onclick="A.s.editQs[${i}].options.push('');render('q-area',paintQs())">+ Add Option</button>
        </div>`
      :q.answerType==='numerical'
      ?`<div class="fg"><label class="lbl">Correct Answer (number)</label>
          <input class="inp" type="number" step="any" value="${esc(String(q.correctAnswer||''))}" onchange="setCA(${i},this.value)" placeholder="e.g. 42.5" style="max-width:240px"></div>`
      :`<div class="fg"><label class="lbl">Correct Answer (case-insensitive)</label>
          <input class="inp" type="text" value="${esc(String(q.correctAnswer||''))}" onchange="setCA(${i},this.value)" placeholder="e.g. photosynthesis" style="max-width:360px"></div>`}
    <details>
      <summary style="cursor:pointer;color:var(--txt-m);font-family:var(--mono);font-size:.7rem;letter-spacing:.08em;text-transform:uppercase;user-select:none;margin-top:.3rem">
        💡 Add Explanation (shown after submission)
      </summary>
      <div style="margin-top:.9rem;padding-top:.9rem;border-top:1px solid var(--bdr)">
        <div class="fg">
          <label class="lbl">Explanation Text (LaTeX OK)</label>
          <textarea class="tex" rows="2" placeholder="Explain the correct answer… LaTeX supported" onchange="setExp(${i},'text',this.value)">${esc(exp.text||'')}</textarea>
        </div>
        <div class="frow">
          <div class="fg"><label class="lbl">Explanation Image URL</label>
            <input class="inp" type="url" value="${esc(exp.image||'')}" oninput="setExp(${i},'image',this.value)" placeholder="https://…">
          </div>
          <div class="fg"><label class="lbl">Explanation YouTube URL</label>
            <input class="inp" type="url" value="${esc(exp.youtube||'')}" oninput="setExp(${i},'youtube',this.value)" placeholder="https://youtube.com/…">
          </div>
        </div>
      </div>
    </details>
  </div>`;
}

async function uploadMedia(qi,input){
  const f=input.files[0];if(!f)return;
  if(f.size>5*1024*1024){toast('Max 5 MB','err');return;}
  toast('Uploading…');
  const r=new FileReader();
  r.onload=async e=>{
    const b64=e.target.result.split(',')[1];
    try{
      const d=await apiPost('uploadFile',{password:A.adminPw,fileData:b64,fileName:f.name,mimeType:f.type});
      if(d.success){A.s.editQs[qi].questionMedia=d.url;render('q-area',paintQs());toast('Uploaded!','ok');}
      else throw new Error(d.error);
    }catch(ex){toast('Upload failed: '+ex.message,'err');}
  };
  r.readAsDataURL(f);
}

async function saveQuiz(id){
  const title=($('et')||{}).value?.trim();
  const cat=($('ec')||{}).value;
  const level=($('elv')||{}).value;
  const desc=($('ed')||{}).value?.trim()||'';
  const tl=parseInt(($('etl')||{}).value)||0;
  const al=parseInt(($('eal')||{}).value)||0;
  const isActive=($('eas')||{}).value??'true';
  if(!title){toast('Please enter a quiz title','err');return;}
  if(!A.s.editQs.length){toast('Add at least one question','err');return;}
  for(let i=0;i<A.s.editQs.length;i++){
    const q=A.s.editQs[i];
    if(!q.questionText.trim()){toast(`Q${i+1}: Enter question text`,'err');return;}
    if(q.answerType==='mcq'&&q.options.filter(o=>o.trim()).length<2){toast(`Q${i+1}: Add at least 2 options`,'err');return;}
  }
  const btn=$('savebtn');btn.disabled=true;btn.textContent='Saving…';
  const payload={password:A.adminPw,title,description:desc,category:cat,level,timeLimit:tl,attemptLimit:al,isActive,
    questions:JSON.stringify(A.s.editQs.map(q=>({questionText:q.questionText,questionType:q.questionType,questionMedia:q.questionMedia||'',answerType:q.answerType,options:q.options||[],correctAnswer:String(q.correctAnswer),explanation:q.explanation||{}})))};
  try{
    let d,newId;
    if(id){payload.quizId=id;d=await apiPost('updateQuiz',payload);newId=id;}
    else{d=await apiPost('createQuiz',payload);newId=d.id;}
    if(!d.success)throw new Error(d.error);
    if(cat==='MathLab'&&A.s.editStudents.length>0){
      await apiPost('uploadStudents',{password:A.adminPw,quizId:newId,students:JSON.stringify(A.s.editStudents)});
    }
    toast(id?'Quiz updated!':'Quiz created!','ok');
    setTimeout(()=>navigate('/admin'),900);
  }catch(e){toast('Error: '+e.message,'err');btn.disabled=false;btn.textContent=id?'Save Changes ✓':'Create Quiz ✓';}
}

// ANALYTICS
// ════════════════════════════════════════════════════════════════
async function showAnalytics(quizId){
  $('app').innerHTML=`<div class="main"><div class="loading"><div class="spin"></div></div></div>`;
  try{
    const d=await apiPost('getAnalytics',{password:A.adminPw,quizId});
    if(!d.success)throw new Error(d.error);
    const{quiz,stats,attempts}=d;
    const dist=[0,0,0,0,0]; // 0-20,21-40,41-60,61-80,81-100
    attempts.forEach(a=>{const p=Number(a.percentage);const b=Math.min(4,Math.floor(p/20));dist[b]++;});
    const distLabels=['0–20%','21–40%','41–60%','61–80%','81–100%'];
    const distColors=['var(--red)','var(--orange)','var(--gold)','var(--blue)','var(--green)'];
    const maxDist=Math.max(...dist,1);

    const distBars=dist.map((v,i)=>`
      <div style="display:flex;align-items:center;gap:.7rem;margin-bottom:.6rem">
        <span style="min-width:65px;font-family:var(--mono);font-size:.68rem;color:var(--txt-m)">${distLabels[i]}</span>
        <div style="flex:1;height:6px;background:var(--bg4);border-radius:3px;overflow:hidden">
          <div style="height:100%;width:${Math.round(v/maxDist*100)}%;background:${distColors[i]};border-radius:3px;transition:.4s"></div>
        </div>
        <span style="min-width:22px;font-family:var(--mono);font-size:.78rem;color:var(--txt-m)">${v}</span>
      </div>`).join('');

    const rows=attempts.map(a=>`<tr>
      <td class="t-mono" style="font-size:.8rem">${esc(String(a.studentIndex||'—'))}</td>
      <td>${esc(a.studentName||'Anonymous')}</td>
      <td style="font-weight:600">${a.score}/${a.total}</td>
      <td>
        <div style="display:flex;align-items:center;gap:.7rem">
          <div style="flex:1;min-width:60px;height:4px;background:var(--bg4);border-radius:2px;overflow:hidden">
            <div style="height:100%;width:${a.percentage}%;background:${Number(a.percentage)>=50?'var(--green)':'var(--red)'};border-radius:2px"></div>
          </div>
          <span class="t-mono" style="min-width:40px;text-align:right;font-size:.82rem;color:${Number(a.percentage)>=50?'var(--green)':'var(--red)'}">${a.percentage}%</span>
        </div>
      </td>
      <td class="hide-m t-mono" style="font-size:.72rem;color:var(--txt-m)">${a.timestamp?new Date(a.timestamp).toLocaleString():'—'}</td>
    </tr>`).join('');

    $('app').innerHTML=`<div class="main">
      <div class="dash-header">
        <div style="display:flex;align-items:center;gap:1rem">
          <button class="btn btn-ghost btn-sm" onclick="navigate('/admin')">← Dashboard</button>
          <div>
            <div class="t-label" style="margin-bottom:.2rem">Analytics</div>
            <h2 class="t-serif t-white" style="font-size:1.4rem">${esc(quiz?.title||'Quiz')}</h2>
          </div>
          ${levelChip(quiz?.level)}
        </div>
        <button class="btn btn-ghost btn-sm" onclick="exportCSV('${esc(quizId)}')">⬇ Export CSV</button>
      </div>
      <div class="kpi-grid">
        <div class="kpi kpi-gold"><div class="kpi-val">${stats.total}</div><div class="kpi-lbl">Total Attempts</div></div>
        <div class="kpi kpi-blue"><div class="kpi-val" style="color:var(--blue)">${stats.avgPct}%</div><div class="kpi-lbl">Average Score</div></div>
        <div class="kpi kpi-green"><div class="kpi-val" style="color:var(--green)">${stats.passed}</div><div class="kpi-lbl">Passed ≥50%</div></div>
        <div class="kpi kpi-purple"><div class="kpi-val" style="color:var(--red)">${stats.failed}</div><div class="kpi-lbl">Below 50%</div></div>
      </div>
      <div style="display:grid;grid-template-columns:1fr 280px;gap:1.4rem;margin-bottom:2rem" class="dash-grid-2">
        <div class="card" style="padding:0;overflow:hidden">
          <div style="padding:1.2rem 1.5rem;border-bottom:1px solid var(--bdr)">
            <div class="section-title" style="margin:0">Attempt Results</div>
          </div>
          ${!attempts.length
            ?`<div class="empty"><div class="empty-ico">📊</div><h3>No attempts yet</h3></div>`
            :`<div style="overflow-x:auto"><table class="atbl"><thead><tr><th>Index</th><th>Name</th><th>Score</th><th>%</th><th class="hide-m">Time</th></tr></thead><tbody>${rows}</tbody></table></div>`}
        </div>
        <div class="card">
          <div class="section-title">Score Distribution</div>
          ${distBars}
        </div>
      </div>
    </div>`;
  }catch(e){
    $('app').innerHTML=`<div class="main"><div class="alert alert-err">${esc(e.message)}</div><button class="btn btn-ghost" style="margin-top:1rem" onclick="navigate('/admin')">← Back</button></div>`;
  }
}

async function exportCSV(quizId){
  try{
    const d=await apiPost('getAnalytics',{password:A.adminPw,quizId});
    if(!d.success)throw new Error(d.error);
    const rows=[['Index Number','Student Name','Score','Total','Percentage','Timestamp'],...d.attempts.map(a=>[a.studentIndex,a.studentName,a.score,a.total,a.percentage+'%',a.timestamp||''])];
    const csv=rows.map(r=>r.map(c=>`"${String(c).replace(/"/g,'""')}"`).join(',')).join('\n');
    const blob=new Blob([csv],{type:'text/csv'});
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');a.href=url;a.download=`mathlab_results_${quizId}.csv`;a.click();URL.revokeObjectURL(url);
    toast('CSV exported!','ok');
  }catch(e){toast('Export failed: '+e.message,'err');}
}
